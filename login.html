<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatEmpresa — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(24,95,165,0.10);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="logo-box"><span>NL</span></div>
      <h4 class="fw-semibold mb-1">NexoLab</h4>
      <p class="text-muted" style="font-size:13px">Comunicación interna empresarial</p>
    </div>

    <!-- Alerta de error -->
    <div id="error-box" class="alert alert-danger d-none" role="alert">
      <i class="bi bi-exclamation-circle me-2"></i>
      <span id="error-msg">Credenciales incorrectas</span>
    </div>

    <!-- Formulario -->
    <form id="login-form" novalidate>
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-envelope text-muted"></i>
          </span>
          <input type="email" id="email" class="form-control border-start-0"
                 placeholder="usuario@empresa.com" required/>
        </div>
        <div class="invalid-feedback">Ingresá un correo válido</div>
      </div>

      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" id="password" class="form-control border-start-0 border-end-0"
                 placeholder="••••••••" required minlength="6"/>
          <button type="button" class="input-group-text bg-light border-start-0"
                  onclick="togglePass()" id="toggle-btn">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
        <div class="invalid-feedback">Mínimo 6 caracteres</div>
      </div>

      <button type="submit" class="btn-primary-custom" id="login-btn">
        <span id="btn-text">Ingresar</span>
        <span id="btn-spinner" class="d-none">
          <span class="spinner-border spinner-border-sm me-2"></span>Ingresando...
        </span>
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="forgot_password.html" class="link-forgot">Olvidé mi contraseña</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function togglePass() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-box');
      const errorMsg = document.getElementById('error-msg');

      errorBox.classList.add('d-none');

      if (!email || !email.includes('@') || password.length < 6) {
        this.classList.add('was-validated');
        return;
      }

      // Mostrar spinner
      document.getElementById('btn-text').classList.add('d-none');
      document.getElementById('btn-spinner').classList.remove('d-none');
      document.getElementById('login-btn').disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('token', data.token);
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('userName', data.user.name);
          localStorage.setItem('userEmail', data.user.email);
          localStorage.setItem('userRole', data.user.role);
          
          // Redirigir según rol
          if (data.user.role === 'ADMINISTRADOR') {
            window.location.href = 'admin-panel.html';
          } else {
            window.location.href = 'conversations.html';
          }
        } else {
          const err = await res.json();
          errorMsg.textContent = err.message || 'Credenciales incorrectas';
          errorBox.classList.remove('d-none');
        }
      } catch {
        // Backend no disponible aún — redirigir igual para desarrollo del frontend
        const isAdmin = email.includes('@admin') || email.includes('admin@');
        localStorage.setItem('token', 'demo-token');
        localStorage.setItem('userId', '1');
        localStorage.setItem('userName', 'Alvaro Garula');
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userRole', isAdmin ? 'ADMINISTRADOR' : 'USER');
        
        if (isAdmin) {
          window.location.href = 'admin-panel.html';
        } else {
          window.location.href = 'conversations.html';
        }
      } finally {
        document.getElementById('btn-text').classList.remove('d-none');
        document.getElementById('btn-spinner').classList.add('d-none');
        document.getElementById('login-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
