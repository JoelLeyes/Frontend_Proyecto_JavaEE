events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name nexolab.cloud-ip.cc 44.210.180.79 _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name nexolab.cloud-ip.cc 44.210.180.79 _;

    ssl_certificate     /etc/nginx/certs/nexolab.cloud-ip.cc/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/nexolab.cloud-ip.cc/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    set $frontend_upstream http://frontend:80;
    set $backend_upstream http://backend:8080;

    location /api/ {
      rewrite ^/api/?(.*)$ /$1 break;
      proxy_pass $backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      add_header Cache-Control "no-store" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
      proxy_pass $frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}