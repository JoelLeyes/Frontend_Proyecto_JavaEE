<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexoLab — Recuperar contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .forgot-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(24,95,165,0.10);
    }
  </style>
</head>
<body>
<div class="forgot-card">

  <!-- Logo -->
  <div class="text-center mb-4">
    <div class="logo-box"><span>NL</span></div>
    <h4 class="fw-semibold mb-1">NexoLab</h4>
    <p class="text-muted" style="font-size:13px">Recupera tu contraseña</p>
  </div>

  <!-- Alerta de error -->
  <div id="error-box" class="alert alert-danger d-none" role="alert">
    <i class="bi bi-exclamation-circle me-2"></i>
    <span id="error-msg">Error al enviar el enlace</span>
  </div>

  <!-- Alerta de éxito -->
  <div id="success-box" class="alert alert-success d-none" role="alert">
    <i class="bi bi-check-circle me-2"></i>
    <span id="success-msg">Enlace enviado a tu correo</span>
  </div>

  <!-- Formulario -->
  <form id="forgot-form" novalidate>
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0">
          <i class="bi bi-envelope text-muted"></i>
        </span>
        <input type="email" id="email" class="form-control border-start-0"
               placeholder="usuario@empresa.com" required/>
      </div>
      <div class="invalid-feedback">Ingresá un correo válido</div>
    </div>

    <button type="submit" class="btn-primary-custom" id="send-btn">
      <span id="btn-text">Enviar enlace de recuperación</span>
      <span id="btn-spinner" class="d-none">
        <span class="spinner-border spinner-border-sm me-2"></span>Enviando...
      </span>
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="login.html" class="link-forgot">Volver al inicio de sesión</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const errorBox = document.getElementById('error-box');
  const successBox = document.getElementById('success-box');
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');

  errorBox.classList.add('d-none');
  successBox.classList.add('d-none');

  if (!email || !email.includes('@') || !email.includes('.')) {
    this.classList.add('was-validated');
    return;
  }

  // Mostrar spinner
  document.getElementById('btn-text').classList.add('d-none');
  document.getElementById('btn-spinner').classList.remove('d-none');

  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (res.ok) {
      successBox.classList.remove('d-none');
      successMsg.textContent = 'Enlace de recuperación enviado a tu correo';
    } else {
      const err = await res.json();
      errorBox.classList.remove('d-none');
      errorMsg.textContent = err.message || 'Error al enviar el enlace';
    }
  } catch {
    // Backend no disponible — simular éxito para desarrollo
    successBox.classList.remove('d-none');
    successMsg.textContent = 'Enlace de recuperación enviado a tu correo';
  }

  // Ocultar spinner
  document.getElementById('btn-text').classList.remove('d-none');
  document.getElementById('btn-spinner').classList.add('d-none');
});
</script>
</body>
</html>
