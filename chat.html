<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexoLab — Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="styles.css" rel="stylesheet"/>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="chat-navbar">
    <a href="conversations.html" class="back-btn"><i class="bi bi-arrow-left"></i></a>
    <div class="chat-avatar" id="nav-avatar">DS</div>
    <div>
      <div class="chat-title" id="nav-title">Desarrollo de Software</div>
      <div class="chat-sub"  id="nav-sub">5 participantes</div>
    </div>
    <div class="ms-auto d-flex gap-2" style="color:var(--primary-light)">
      <button class="btn btn-link p-0" style="color:var(--primary-light)" onclick="toggleSearch()"><i class="bi bi-search"></i></button>
      <button class="btn btn-link p-0" style="color:var(--primary-light)"><i class="bi bi-three-dots-vertical"></i></button>
    </div>
  </div>

  <!-- Barra de búsqueda -->
  <div class="chat-search-bar" id="chat-search-bar">
    <i class="bi bi-search" style="color:rgba(255,255,255,.55);font-size:14px"></i>
    <input class="chat-search-input" id="chat-search-input" type="text"
           placeholder="Buscar en el chat..." oninput="onSearchInput()"/>
    <span class="search-nav-count" id="search-nav-count"></span>
    <button class="search-nav-btn" id="search-prev" onclick="navigateSearch(-1)" disabled title="Anterior"><i class="bi bi-chevron-up"></i></button>
    <button class="search-nav-btn" id="search-next" onclick="navigateSearch(1)"  disabled title="Siguiente"><i class="bi bi-chevron-down"></i></button>
    <button class="search-nav-btn" onclick="closeSearch()" title="Cerrar"><i class="bi bi-x-lg"></i></button>
  </div>

  <!-- Banner modo demo -->
  <div class="demo-banner d-none" id="demo-banner">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span><strong>Modo demo</strong> — el servidor no está disponible. Mostrando datos de ejemplo.</span>
  </div>

  <!-- Mensajes -->
  <div class="messages-area" id="messages-area">
    <!-- Se genera con JS -->
  </div>

  <!-- Emoji picker -->
  <div class="emoji-picker" id="emoji-picker">
    <button class="emoji-btn" onclick="insertEmoji('😊')">😊</button>
    <button class="emoji-btn" onclick="insertEmoji('😂')">😂</button>
    <button class="emoji-btn" onclick="insertEmoji('❤️')">❤️</button>
    <button class="emoji-btn" onclick="insertEmoji('👍')">👍</button>
    <button class="emoji-btn" onclick="insertEmoji('🙌')">🙌</button>
    <button class="emoji-btn" onclick="insertEmoji('🎉')">🎉</button>
    <button class="emoji-btn" onclick="insertEmoji('😅')">😅</button>
    <button class="emoji-btn" onclick="insertEmoji('🤔')">🤔</button>
    <button class="emoji-btn" onclick="insertEmoji('👀')">👀</button>
    <button class="emoji-btn" onclick="insertEmoji('✅')">✅</button>
    <button class="emoji-btn" onclick="insertEmoji('🔥')">🔥</button>
    <button class="emoji-btn" onclick="insertEmoji('💪')">💪</button>
    <button class="emoji-btn" onclick="insertEmoji('😎')">😎</button>
    <button class="emoji-btn" onclick="insertEmoji('🚀')">🚀</button>
    <button class="emoji-btn" onclick="insertEmoji('⚡')">⚡</button>
    <button class="emoji-btn" onclick="insertEmoji('📌')">📌</button>
    <button class="emoji-btn" onclick="insertEmoji('📎')">📎</button>
    <button class="emoji-btn" onclick="insertEmoji('🗓️')">🗓️</button>
    <button class="emoji-btn" onclick="insertEmoji('💡')">💡</button>
    <button class="emoji-btn" onclick="insertEmoji('⚠️')">⚠️</button>
    <button class="emoji-btn" onclick="insertEmoji('✍️')">✍️</button>
    <button class="emoji-btn" onclick="insertEmoji('🤝')">🤝</button>
    <button class="emoji-btn" onclick="insertEmoji('👋')">👋</button>
    <button class="emoji-btn" onclick="insertEmoji('😬')">😬</button>
    <button class="emoji-btn" onclick="insertEmoji('🙏')">🙏</button>
    <button class="emoji-btn" onclick="insertEmoji('😴')">😴</button>
    <button class="emoji-btn" onclick="insertEmoji('🥳')">🥳</button>
    <button class="emoji-btn" onclick="insertEmoji('😤')">😤</button>
  </div>

  <!-- Barra de entrada -->
  <div class="input-bar" style="position:relative">
    <button class="attach-btn" title="Adjuntar archivo">
      <i class="bi bi-paperclip"></i>
    </button>
    <button class="attach-btn" title="Emojis" onclick="toggleEmojiPicker(event)">
      <i class="bi bi-emoji-smile"></i>
    </button>
    <textarea class="msg-input" id="msg-input" placeholder="Escribe un mensaje..."
              rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()" id="send-btn">
      <i class="bi bi-send-fill"></i>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const convId   = params.get('id')   || '1';
    const convName = params.get('name') || 'Conversación';
    const convTypeRaw = params.get('type') || 'PRIVADO';
    const convType = String(convTypeRaw).trim().toUpperCase();
    const isGroup  = convType === 'GRUPAL' || convType === 'GROUP';

    const token = localStorage.getItem('jwt_token');
    const currentUser = JSON.parse(localStorage.getItem('current_user') || '{}');
    const currentUserId = String(currentUser.idUsuario || currentUser.id || '');

    document.getElementById('nav-title').textContent  = convName;
    document.getElementById('nav-sub').textContent    = isGroup ? 'Grupo' : '';
    document.getElementById('nav-avatar').textContent = initials(convName);

    const loadedIds = new Set();
    let lastPollTime = new Date();

    // Demo — se reemplaza con datos reales cuando el backend responde
    const DEMO_MESSAGES = [
      {
        idMensaje:'demo-1', contenido:'Suban el nuevo build al servidor de pruebas',
        fechaEnviado: new Date(Date.now()-3600000).toISOString(), adjuntos:[],
        estados:[
          { estado:'ENVIADO',   usuarioIdUsuario:'2', usuario:{ idUsuario:'2', nombre:'Maria', apellido:'Lopez' } },
          { estado:'ENTREGADO', usuarioIdUsuario:currentUserId, usuario:{ idUsuario:currentUserId, nombre:currentUser.nombre, apellido:currentUser.apellido } },
        ]
      },
      {
        idMensaje:'demo-2', contenido:'Ya lo tengo listo, subo en 5 min',
        fechaEnviado: new Date(Date.now()-3200000).toISOString(), adjuntos:[],
        estados:[
          { estado:'ENVIADO',   usuarioIdUsuario:'3', usuario:{ idUsuario:'3', nombre:'Carlos', apellido:'R.' } },
          { estado:'ENTREGADO', usuarioIdUsuario:currentUserId, usuario:{ idUsuario:currentUserId, nombre:currentUser.nombre, apellido:currentUser.apellido } },
        ]
      },
      {
        idMensaje:'demo-3', contenido:'Perfecto, yo hago el deploy al EC2',
        fechaEnviado: new Date(Date.now()-2800000).toISOString(), adjuntos:[],
        estados:[
          { estado:'ENVIADO',   usuarioIdUsuario:currentUserId, usuario:{ idUsuario:currentUserId, nombre:currentUser.nombre, apellido:currentUser.apellido } },
          { estado:'ENTREGADO', usuarioIdUsuario:'2', usuario:{ idUsuario:'2', nombre:'Maria', apellido:'Lopez' } },
        ]
      },
      {
        idMensaje:'demo-4', contenido:'Acá el informe del sprint',
        fechaEnviado: new Date(Date.now()-2400000).toISOString(),
        adjuntos:[{ idAdjunto:'1', tipoArchivo:'PDF', nombreArchivo:'informe_sprint.pdf', urlArchivo:'#' }],
        estados:[
          { estado:'ENVIADO',   usuarioIdUsuario:'2', usuario:{ idUsuario:'2', nombre:'Maria', apellido:'Lopez' } },
          { estado:'ENTREGADO', usuarioIdUsuario:currentUserId, usuario:{ idUsuario:currentUserId, nombre:currentUser.nombre, apellido:currentUser.apellido } },
        ]
      },
      {
        idMensaje:'demo-5', contenido:'Gracias, lo reviso ahora',
        fechaEnviado: new Date(Date.now()-2000000).toISOString(), adjuntos:[],
        estados:[
          { estado:'ENVIADO',   usuarioIdUsuario:currentUserId, usuario:{ idUsuario:currentUserId, nombre:currentUser.nombre, apellido:currentUser.apellido } },
          { estado:'ENTREGADO', usuarioIdUsuario:'2', usuario:{ idUsuario:'2', nombre:'Maria', apellido:'Lopez' } },
        ]
      },
    ];

    let messages = [];

    function setMessages(newMsgs) {
      loadedIds.clear();
      messages = Array.isArray(newMsgs) ? [...newMsgs] : [];
      for (const m of messages) loadedIds.add(String(m.idMensaje));
      messages.sort((a, b) => new Date(a.fechaEnviado) - new Date(b.fechaEnviado));
      renderMessages();
    }

    function renderMessages() {
      const area = document.getElementById('messages-area');
      let html = '';
      let lastDate = null;

      messages.forEach(msg => {
        const sentAt  = new Date(msg.fechaEnviado);
        const dateStr = sentAt.toDateString();

        const estados = msg.estados || [];
        const enviado = estados.find(e => e.estado === 'ENVIADO');
        const senderId = enviado ? String(enviado.usuarioIdUsuario || (enviado.usuario && enviado.usuario.idUsuario) || '') : '';
        const senderName = (enviado && enviado.usuario)
          ? ((enviado.usuario.nombre || '') + ' ' + (enviado.usuario.apellido || '')).trim()
          : (senderId ? ('Usuario ' + senderId) : '');

        const mine = senderId && senderId === currentUserId;

        // Separador de fecha
        if (dateStr !== lastDate) {
          lastDate = dateStr;
          html += `<div class="date-sep"><hr/><span>${formatDate(sentAt)}</span><hr/></div>`;
        }

        // Nombre del emisor en grupos
        const sender = isGroup && !mine && senderName
          ? `<div class="msg-sender">${senderName}</div>` : '';

        // Estado (entregado/leído) derivado de estados_mensaje
        const otherStates = senderId
          ? estados.filter(e => String(e.usuarioIdUsuario) !== senderId)
          : [];
        const delivered = mine && otherStates.length > 0 && otherStates.every(e => e.estado === 'ENTREGADO' || e.estado === 'LEÍDO');
        const read = mine && otherStates.length > 0 && otherStates.every(e => e.estado === 'LEÍDO');

        const ticks = mine
          ? `<i class="bi bi-check${delivered ? '-all' : ''}${read ? ' text-info' : ''}" style="font-size:11px"></i>`
          : '';

        // Adjunto (si existe)
        let attachHtml = '';
        const atts = msg.adjuntos || [];
        if (atts.length > 0) {
          const a = atts[0];
          const tipo = (a.tipoArchivo || '').toUpperCase();
          const isImg = tipo.includes('IMAGE') || tipo.includes('IMG');
          attachHtml = `
            <div class="attachment-bubble ${mine ? '' : 'in'}">
              <div class="file-icon" style="background:${mine ? 'rgba(255,255,255,.2)' : '#E6F1FB'}">
                <i class="bi bi-${isImg ? 'image' : 'file-earmark-pdf'}" style="color:${mine ? '#fff' : 'var(--primary)'}"></i>
              </div>
              <div>
                <div style="font-size:12px;font-weight:500">${a.nombreArchivo || 'archivo'}</div>
                <div style="font-size:10px;opacity:.7">${a.tipoArchivo || ''}</div>
              </div>
            </div>`;
        }

        const msgId      = String(msg.idMensaje);
        const isCurrent  = searchMatchIds.length > 0 && msgId === searchMatchIds[searchIndex];
        const contenido  = searchTerm ? highlightText(msg.contenido, searchTerm) : msg.contenido;

        html += `
          <div class="msg-wrap ${mine ? 'out' : 'in'}${isCurrent ? ' search-current' : ''}" id="msg-${msgId}">
            ${sender}
            <div class="bubble ${mine ? 'out' : 'in'}">
              ${contenido}
              ${attachHtml}
              <div class="msg-time ${mine ? 'out' : 'in'}">
                ${formatTime(sentAt)} ${ticks}
              </div>
            </div>
          </div>`;
      });

      area.innerHTML = html;
      if (!searchTerm) scrollBottom();
    }

    function scrollBottom() {
      const area = document.getElementById('messages-area');
      area.scrollTop = area.scrollHeight;
    }

    function addMessages(newMsgs) {
      let added = false;
      for (const msg of newMsgs) {
        const id = String(msg.idMensaje);
        if (!loadedIds.has(id)) {
          loadedIds.add(id);
          messages.push(msg);
          added = true;
        }
      }
      if (added) {
        messages.sort((a, b) => new Date(a.fechaEnviado) - new Date(b.fechaEnviado));
        if (!searchTerm) renderMessages();
      }
    }

    async function initChat() {
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      try {
        const res = await fetch(`/api/chats/${convId}/messages`, {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (res.ok) {
          setMessages(await res.json());
        } else {
          setMessages(DEMO_MESSAGES);
          showDemoBanner();
        }
      } catch {
        setMessages(DEMO_MESSAGES);
        showDemoBanner();
      }
      lastPollTime = new Date();
    }

    async function pollMessages() {
      try {
        const res = await fetch(
          `/api/chats/${convId}/messages?since=${lastPollTime.toISOString()}`,
          { headers: { Authorization: 'Bearer ' + token } }
        );
        if (res.ok) {
          const newMsgs = await res.json();
          addMessages(newMsgs);
          if (newMsgs.length > 0) lastPollTime = new Date();
        }
      } catch { /* sin backend */ }
    }

    async function sendMessage() {
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      const input = document.getElementById('msg-input');
      const text  = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      input.value  = '';
      autoResize(input);

      try {
        const res = await fetch(`/api/chats/${convId}/messages`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
          body:    JSON.stringify({ contenido: text })
        });
        if (res.ok) await pollMessages();
      } catch { /* sin backend */ } finally {
        btn.disabled = false;
      }
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function initials(name) {
      const parts = (name || '').trim().split(' ');
      return parts.length >= 2
        ? (parts[0][0] + parts[1][0]).toUpperCase()
        : (name || 'U').substring(0, 2).toUpperCase();
    }

    function formatTime(dt) {
      return dt.toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
    }

    function formatDate(dt) {
      const now  = new Date();
      const diff = Math.floor((now - dt) / 86400000);
      if (diff === 0) return 'Hoy';
      if (diff === 1) return 'Ayer';
      return dt.toLocaleDateString('es', { day:'2-digit', month:'long' });
    }

    // ── Banner demo ──────────────────────────────────────────
    function showDemoBanner() {
      document.getElementById('demo-banner').classList.remove('d-none');
    }

    // ── Emoji picker ─────────────────────────────────────────
    function toggleEmojiPicker(e) {
      e.stopPropagation();
      document.getElementById('emoji-picker').classList.toggle('open');
    }

    function insertEmoji(emoji) {
      const input = document.getElementById('msg-input');
      const start = input.selectionStart;
      const end   = input.selectionEnd;
      input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
      const pos = start + emoji.length;
      input.setSelectionRange(pos, pos);
      input.focus();
      autoResize(input);
    }

    document.addEventListener('click', () => {
      document.getElementById('emoji-picker').classList.remove('open');
    });

    // ── Búsqueda ─────────────────────────────────────────────
    let searchTerm     = '';
    let searchMatchIds = [];
    let searchIndex    = -1;
    let searchDebounce = null;

    function toggleSearch() {
      const bar = document.getElementById('chat-search-bar');
      if (bar.classList.contains('open')) {
        closeSearch();
      } else {
        bar.classList.add('open');
        document.getElementById('chat-search-input').focus();
      }
    }

    function closeSearch() {
      document.getElementById('chat-search-bar').classList.remove('open');
      document.getElementById('chat-search-input').value = '';
      searchTerm     = '';
      searchMatchIds = [];
      searchIndex    = -1;
      updateSearchNav();
      renderMessages();
    }

    function onSearchInput() {
      clearTimeout(searchDebounce);
      const val = document.getElementById('chat-search-input').value.trim();
      if (val.length < 2) {
        searchTerm = ''; searchMatchIds = []; searchIndex = -1;
        updateSearchNav();
        renderMessages();
        return;
      }
      searchDebounce = setTimeout(() => performSearch(val), 400);
    }

    async function performSearch(term) {
      try {
        const res = await fetch(
          `/api/chats/${convId}/messages?search=${encodeURIComponent(term)}`,
          { headers: { Authorization: 'Bearer ' + token } }
        );
        if (!res.ok) return;
        const results = await res.json();
        // incorporar al array principal sin duplicados
        for (const m of results) {
          const id = String(m.idMensaje);
          if (!loadedIds.has(id)) { loadedIds.add(id); messages.push(m); }
        }
        messages.sort((a, b) => new Date(a.fechaEnviado) - new Date(b.fechaEnviado));
        searchTerm     = term;
        searchMatchIds = results.map(m => String(m.idMensaje));
        searchIndex    = searchMatchIds.length > 0 ? 0 : -1;
        updateSearchNav();
        renderMessages();
        if (searchIndex >= 0) scrollToMatch(searchIndex);
      } catch { /* sin backend */ }
    }

    function navigateSearch(dir) {
      if (searchMatchIds.length === 0) return;
      searchIndex = (searchIndex + dir + searchMatchIds.length) % searchMatchIds.length;
      updateSearchNav();
      renderMessages();
      scrollToMatch(searchIndex);
    }

    function scrollToMatch(idx) {
      const el = document.getElementById('msg-' + searchMatchIds[idx]);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function updateSearchNav() {
      const count = document.getElementById('search-nav-count');
      const prev  = document.getElementById('search-prev');
      const next  = document.getElementById('search-next');
      const n     = searchMatchIds.length;
      count.textContent = n === 0 ? (searchTerm ? 'Sin resultados' : '') : `${searchIndex + 1} de ${n}`;
      prev.disabled = n === 0;
      next.disabled = n === 0;
    }

    function highlightText(text, term) {
      const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="search-hit">$1</mark>');
    }

    initChat();
    setInterval(pollMessages, 3000);
  </script>

  <!-- Footer -->
  <footer class="text-center py-3 text-muted" style="font-size: 12px; background: #fff; border-top: 1px solid #e0e0e0;">
    <div class="container">
      <p>&copy; 2026 NexoLab. Todos los derechos reservados.</p>
      <p>
        <a href="#" style="color: var(--primary); text-decoration: none;">Términos de uso</a> |
        <a href="#" style="color: var(--primary); text-decoration: none;">Política de privacidad</a>
      </p>
    </div>
  </footer>
</body>
</html>
