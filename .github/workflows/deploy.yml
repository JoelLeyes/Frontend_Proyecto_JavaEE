name: Deploy Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: nexolab-prod-deploy
  cancel-in-progress: false

env:
  ECR_REGISTRY: 614560290350.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: proyecto/frontend
  EC2_HOST: 44.210.180.79
  EC2_USER: ec2-user
  EC2_APP_DIR: /home/ec2-user/app
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  SMTP_FROM: ${{ secrets.SMTP_FROM }}
  UPLOAD_DIR: ${{ secrets.UPLOAD_DIR }}
  ATLAS_MONGODB_URI: ${{ secrets.ATLAS_MONGODB_URI }}
  FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Resolve Docker Compose version
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          compose_arch="$(uname -m)"
          case "${compose_arch}" in
            x86_64) compose_arch="x86_64" ;;
            aarch64|arm64) compose_arch="aarch64" ;;
            *) echo "Arquitectura no soportada: ${compose_arch}" >&2; exit 1 ;;
          esac

          compose_version="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/docker/compose/releases/latest \
            | tr -d '\n' \
            | sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
          if [ -z "${compose_version}" ]; then
            echo "No pude resolver la versión de Docker Compose." >&2
            exit 1
          fi

          {
            echo "DOCKER_COMPOSE_VERSION=${compose_version}"
            echo "DOCKER_COMPOSE_ARCH=${compose_arch}"
          } >> "$GITHUB_ENV"

      - name: Update EC2 Security Group to allow runner IP
        run: |
          set -euo pipefail
          runner_ip="$(curl -s https://checkip.amazonaws.com | tr -d '\r\n')"
          cidr="${runner_ip}/32"
          echo "Runner IP: ${cidr}"
          echo "RUNNER_IP=${runner_ip}" >> "$GITHUB_ENV"
          echo "RUNNER_CIDR=${cidr}" >> "$GITHUB_ENV"

          instance_json="$(aws ec2 describe-instances --filters "Name=ip-address,Values=${EC2_HOST}" --query 'Reservations[].Instances[].{InstanceId:InstanceId,SecurityGroups:SecurityGroups[].{GroupId:GroupId,GroupName:GroupName}}' --output json)"
          if [ "${instance_json}" = "[]" ] || [ -z "${instance_json}" ]; then
            echo "No encontré la EC2 con IP pública ${EC2_HOST}"
            exit 1
          fi

          group_ids="$(INSTANCE_JSON="${instance_json}" python3 - <<'PY'
          import json, os
          data = json.loads(os.environ["INSTANCE_JSON"])
          data = data[0] if isinstance(data, list) and data else data
          print("\n".join([sg["GroupId"] for sg in data.get("SecurityGroups", [])]))
          PY
          )"

          if [ -z "${group_ids}" ]; then
            echo "La instancia no tiene Security Groups"
            exit 1
          fi

          while IFS= read -r sg_id; do
            [ -z "${sg_id}" ] && continue
            echo "Actualizando SG: ${sg_id}"

            perm_json="$(CIDR="${cidr}" python3 - <<'PY'
          import json, os
          cidr = os.environ["CIDR"]
          print(json.dumps([
              {
                  "IpProtocol": "tcp",
                  "FromPort": 22,
                  "ToPort": 22,
                  "IpRanges": [
                      {"CidrIp": cidr, "Description": "AUTO-SSH GitHub Actions"}
                  ],
              }
          ]))
          PY
            )"

            if out="$(aws ec2 authorize-security-group-ingress --group-id "${sg_id}" --ip-permissions "${perm_json}" 2>&1)"; then
              echo "Regla SSH autorizada en ${sg_id} para ${cidr}"
            else
              rc=$?
              if echo "${out}" | grep -q "InvalidPermission.Duplicate"; then
                echo "La regla ya existía en ${sg_id} para ${cidr}"
              else
                echo "${out}"
                exit "${rc}"
              fi
            fi
          done <<< "${group_ids}"

          sleep 20

      - name: Ensure EC2 instance is running
        run: |
          set -euo pipefail
          instance_id="$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=${EC2_HOST}" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"

          if [ -z "${instance_id}" ] || [ "${instance_id}" = "None" ]; then
            echo "No se encontró ninguna instancia EC2 con IP ${EC2_HOST}"
            exit 1
          fi

          echo "EC2_INSTANCE_ID=${instance_id}" >> "$GITHUB_ENV"

          state="$(aws ec2 describe-instances \
            --instance-ids "${instance_id}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)"
          echo "Instancia ${instance_id} — estado actual: ${state}"

          if [ "${state}" = "stopped" ]; then
            echo "La instancia está detenida. Iniciando..."
            aws ec2 start-instances --instance-ids "${instance_id}"
            aws ec2 wait instance-running --instance-ids "${instance_id}"
            echo "Instancia en running. Esperando status checks (puede tardar ~90s)..."
            aws ec2 wait instance-status-ok --instance-ids "${instance_id}"
            echo "Instancia lista para recibir conexiones."
          elif [ "${state}" = "running" ]; then
            echo "La instancia ya está en running."
          else
            echo "Estado inesperado: ${state}. Abortando."
            exit 1
          fi

          echo "Esperando status checks (puede tardar ~90s)..."
          aws ec2 wait instance-status-ok --instance-ids "${instance_id}"
          echo "Instancia lista para recibir conexiones."


      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Refresh EC2 Security Group before remote deploy
        run: |
          set -euo pipefail
          runner_ip="$(curl -s https://checkip.amazonaws.com | tr -d '\r\n')"
          cidr="${runner_ip}/32"
          echo "Runner IP before SSH: ${cidr}"

          instance_json="$(aws ec2 describe-instances --filters "Name=ip-address,Values=${EC2_HOST}" --query 'Reservations[].Instances[].{InstanceId:InstanceId,SecurityGroups:SecurityGroups[].{GroupId:GroupId,GroupName:GroupName}}' --output json)"
          if [ "${instance_json}" = "[]" ] || [ -z "${instance_json}" ]; then
            echo "No encontré la EC2 con IP pública ${EC2_HOST}"
            exit 1
          fi

          group_ids="$(INSTANCE_JSON="${instance_json}" python3 - <<'PY'
          import json, os
          data = json.loads(os.environ["INSTANCE_JSON"])
          data = data[0] if isinstance(data, list) and data else data
          print("\n".join([sg["GroupId"] for sg in data.get("SecurityGroups", [])]))
          PY
          )"

          if [ -z "${group_ids}" ]; then
            echo "La instancia no tiene Security Groups"
            exit 1
          fi

          while IFS= read -r sg_id; do
            [ -z "${sg_id}" ] && continue
            echo "Reforzando SG: ${sg_id}"

            perm_json="$(CIDR="${cidr}" python3 - <<'PY'
          import json, os
          cidr = os.environ["CIDR"]
          print(json.dumps([
              {
                  "IpProtocol": "tcp",
                  "FromPort": 22,
                  "ToPort": 22,
                  "IpRanges": [
                      {"CidrIp": cidr, "Description": "AUTO-SSH GitHub Actions"}
                  ],
              }
          ]))
          PY
            )"

            if out="$(aws ec2 authorize-security-group-ingress --group-id "${sg_id}" --ip-permissions "${perm_json}" 2>&1)"; then
              echo "Regla SSH autorizada/refrescada en ${sg_id} para ${cidr}"
            else
              rc=$?
              if echo "${out}" | grep -q "InvalidPermission.Duplicate"; then
                echo "La regla ya existía en ${sg_id} para ${cidr}"
              else
                echo "${out}"
                exit "${rc}"
              fi
            fi
          done <<< "${group_ids}"

          sleep 20

      - name: Write EC2 private key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          umask 077
          python3 - <<'PY' > key.pem
          import os, sys, base64, binascii

          secret = os.environ.get("EC2_SSH_KEY") or ""
          if not secret.strip():
            sys.stderr.write("EC2_SSH_KEY está vacío\n")
            sys.exit(1)

          if "BEGIN" in secret:
            # Soporta PEM multilinea y PEM en una sola línea con \n literales.
            sys.stdout.write(secret.replace("\\n", "\n").replace("\r", ""))
          else:
            # Permite guardar el PEM como base64 en el mismo secret.
            try:
              sys.stdout.buffer.write(base64.b64decode(secret))
            except binascii.Error:
              sys.stderr.write("EC2_SSH_KEY no parece ser PEM ni base64 válido\n")
              sys.exit(1)
          PY
          chmod 600 key.pem
          ssh-keygen -y -f key.pem > /dev/null

      - name: Trigger remote deploy (pull + up)
        run: |
          jwt_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['JWT_SECRET']))
          PY
          )"
          smtp_host_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['SMTP_HOST']))
          PY
          )"
          smtp_port_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['SMTP_PORT']))
          PY
          )"
          smtp_user_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['SMTP_USER']))
          PY
          )"
          smtp_pass_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['SMTP_PASS']))
          PY
          )"
          smtp_from_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['SMTP_FROM']))
          PY
          )"
          upload_dir_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['UPLOAD_DIR']))
          PY
          )"
          gemini_api_key_q="$(python3 - <<'PY'
          import os, shlex
          print(shlex.quote(os.environ['GEMINI_API_KEY']))
          PY
          )"
          fcm_json_q="$(python3 - <<'PY'
          import os, shlex
          v = os.environ.get('FCM_SERVICE_ACCOUNT_JSON', '')
          print(shlex.quote(v) if v else "''")
          PY
          )"

          for attempt in 1 2 3 4 5; do
            if ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o ConnectTimeout=10 -i key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "set -euo pipefail
            sudo mkdir -p ${EC2_APP_DIR}/deploy"; then
              scp -i key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 ./deploy/docker-compose.ec2.yml ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/docker-compose.yml
              scp -i key.pem -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ConnectTimeout=10 ./deploy/nginx.conf ${{ env.EC2_USER }}@${{ env.EC2_HOST }}:/tmp/nginx.conf
              ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o ConnectTimeout=20 -i key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "sudo install -m 0644 /tmp/docker-compose.yml ${EC2_APP_DIR}/docker-compose.yml
              sudo install -m 0644 /tmp/nginx.conf ${EC2_APP_DIR}/deploy/nginx.conf"
            fi

            if aws ecr get-login-password --region us-east-1 | ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -o ConnectTimeout=10 -i key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "set -euo pipefail
            if ! docker compose version >/dev/null 2>&1; then
            echo 'Docker Compose no está instalado. Instalando...'
            sudo mkdir -p /usr/local/lib/docker/cli-plugins
            sudo curl -fsSL "https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-linux-${DOCKER_COMPOSE_ARCH}" -o /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            docker compose version
            docker login --username AWS --password-stdin ${ECR_REGISTRY}
            sudo mkdir -p ${EC2_APP_DIR}
            cd ${EC2_APP_DIR}

            if [ -f /home/ec2-user/app/certs/nexolab.cloud-ip.cc/certificate.crt ] && [ -f /home/ec2-user/app/certs/nexolab.cloud-ip.cc/ca_bundle.crt ]; then
              sudo sh -c 'set -euo pipefail; CERT_DIR=/home/ec2-user/app/certs/nexolab.cloud-ip.cc; cat "\$CERT_DIR/certificate.crt" "\$CERT_DIR/ca_bundle.crt" > "\$CERT_DIR/fullchain.pem"; chmod 644 "\$CERT_DIR/fullchain.pem"'
            else
              echo 'Faltan certificate.crt o ca_bundle.crt en /home/ec2-user/app/certs/nexolab.cloud-ip.cc' >&2
              exit 1
            fi

            rm -f .env || true

            export JWT_SECRET=${jwt_q}
            export SMTP_HOST=${smtp_host_q}
            export SMTP_PORT=${smtp_port_q}
            export SMTP_USER=${smtp_user_q}
            export SMTP_PASS=${smtp_pass_q}
            export SMTP_FROM=${smtp_from_q}
            export UPLOAD_DIR=${upload_dir_q}
            export GEMINI_API_KEY=${gemini_api_key_q}
            export FCM_SERVICE_ACCOUNT_JSON=${fcm_json_q}
            export SMTP_STARTTLS=true
            sudo docker rm -f nexolab-nginx >/dev/null 2>&1 || true

            sudo --preserve-env=JWT_SECRET,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,UPLOAD_DIR,ATLAS_MONGODB_URI,FCM_SERVICE_ACCOUNT_JSON,GEMINI_API_KEY,SMTP_STARTTLS env DOCKER_CONFIG="/home/ec2-user/.docker" docker compose pull frontend nginx
            sudo --preserve-env=JWT_SECRET,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,UPLOAD_DIR,ATLAS_MONGODB_URI,FCM_SERVICE_ACCOUNT_JSON,GEMINI_API_KEY,SMTP_STARTTLS env DOCKER_CONFIG="/home/ec2-user/.docker" docker compose up -d --pull always --force-recreate frontend nginx
            sudo --preserve-env=JWT_SECRET,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,UPLOAD_DIR,ATLAS_MONGODB_URI,FCM_SERVICE_ACCOUNT_JSON,GEMINI_API_KEY,SMTP_STARTTLS env DOCKER_CONFIG="/home/ec2-user/.docker" docker compose ps"; then
              exit 0
            fi

            echo "SSH attempt ${attempt} failed; retrying in 10 seconds..."
            sleep 10
          done

          echo "Remote deploy failed after 5 SSH attempts."
          exit 1
