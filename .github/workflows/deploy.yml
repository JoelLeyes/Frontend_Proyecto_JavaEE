name: Deploy Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ECR_REGISTRY: 058264217545.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: proyecto/frontend
  EC2_HOST: 44.195.111.17
  EC2_USER: ec2-user
  EC2_APP_DIR: /home/ec2-user/app
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Update EC2 Security Group to allow runner IP
        run: |
          set -euo pipefail
          runner_ip="$(curl -s https://checkip.amazonaws.com | tr -d '\r\n')"
          cidr="${runner_ip}/32"
          echo "Runner IP: ${cidr}"

          instance_json="$(aws ec2 describe-instances --filters "Name=ip-address,Values=${EC2_HOST}" --query 'Reservations[].Instances[].{InstanceId:InstanceId,SecurityGroups:SecurityGroups[].{GroupId:GroupId,GroupName:GroupName}}' --output json)"
          if [ "${instance_json}" = "[]" ] || [ -z "${instance_json}" ]; then
            echo "No encontré la EC2 con IP pública ${EC2_HOST}"
            exit 1
          fi

          group_ids="$(INSTANCE_JSON="${instance_json}" python3 - <<'PY'
          import json, os
          data = json.loads(os.environ["INSTANCE_JSON"])
          data = data[0] if isinstance(data, list) and data else data
          print("\n".join([sg["GroupId"] for sg in data.get("SecurityGroups", [])]))
          PY
          )"

          if [ -z "${group_ids}" ]; then
            echo "La instancia no tiene Security Groups"
            exit 1
          fi

          while IFS= read -r sg_id; do
            [ -z "${sg_id}" ] && continue
            echo "Actualizando SG: ${sg_id}"

            rules_json="$(aws ec2 describe-security-group-rules --filters "Name=group-id,Values=${sg_id}" --query 'SecurityGroupRules[?IsEgress==`false` && IpProtocol==`tcp` && FromPort==`22` && ToPort==`22`].{Id:SecurityGroupRuleId,Cidr:CidrIpv4,Desc:Description}' --output json || true)"
            revoke_ids="$(RULES_JSON="${rules_json}" KEEP_CIDR="${cidr}" python3 - <<'PY'
          import json, os
          rules = json.loads(os.environ.get("RULES_JSON") or "[]")
          keep = os.environ["KEEP_CIDR"]
          ids = [
              r.get("Id")
              for r in rules
              if (r.get("Desc") or "").startswith("AUTO-SSH")
              and r.get("Cidr")
              and r.get("Cidr") != keep
              and r.get("Id")
            ]
          print(" ".join(ids))
          PY
            )"

            if [ -n "${revoke_ids}" ]; then
              aws ec2 revoke-security-group-ingress --group-id "${sg_id}" --security-group-rule-ids ${revoke_ids}
            fi

            perm_json="$(CIDR="${cidr}" python3 - <<'PY'
          import json, os
          cidr = os.environ["CIDR"]
          print(json.dumps([
              {
                  "IpProtocol": "tcp",
                  "FromPort": 22,
                  "ToPort": 22,
                  "IpRanges": [
                      {"CidrIp": cidr, "Description": "AUTO-SSH GitHub Actions"}
                  ],
              }
          ]))
          PY
            )"

            if out="$(aws ec2 authorize-security-group-ingress --group-id "${sg_id}" --ip-permissions "${perm_json}" 2>&1)"; then
              echo "Regla SSH autorizada en ${sg_id} para ${cidr}"
            else
              rc=$?
              if echo "${out}" | grep -q "InvalidPermission.Duplicate"; then
                echo "La regla ya existía en ${sg_id} para ${cidr}"
              else
                echo "${out}"
                exit "${rc}"
              fi
            fi
          done <<< "${group_ids}"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Write EC2 private key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          umask 077
          python3 - <<'PY' > key.pem
          import os, sys, base64, binascii

          secret = os.environ.get("EC2_SSH_KEY") or ""
          if not secret.strip():
            sys.stderr.write("EC2_SSH_KEY está vacío\n")
            sys.exit(1)

          if "BEGIN" in secret:
            # Soporta PEM multilinea y PEM en una sola línea con \n literales.
            sys.stdout.write(secret.replace("\\n", "\n").replace("\r", ""))
          else:
            # Permite guardar el PEM como base64 en el mismo secret.
            try:
              sys.stdout.buffer.write(base64.b64decode(secret))
            except binascii.Error:
              sys.stderr.write("EC2_SSH_KEY no parece ser PEM ni base64 válido\n")
              sys.exit(1)
          PY
          chmod 600 key.pem
          ssh-keygen -y -f key.pem > /dev/null

      - name: Trigger remote deploy (pull + up)
        run: |
          aws ecr get-login-password --region us-east-1 | ssh -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "set -euo pipefail
          docker login --username AWS --password-stdin ${ECR_REGISTRY}
          cd ${EC2_APP_DIR}
          docker compose pull
          docker compose up -d --pull always --force-recreate"
