name: Deploy Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ECR_REGISTRY: 058264217545.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME: proyecto/frontend
  EC2_HOST: 44.195.111.17
  EC2_USER: ec2-user
  EC2_APP_DIR: /home/ec2-user/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Update EC2 Security Group to allow runner IP
        run: |
          if [ -f ./scripts/update-ec2-ssh-sg.ps1 ]; then
            pwsh -NoProfile -Command "./scripts/update-ec2-ssh-sg.ps1 -InstancePublicIp ${{ env.EC2_HOST }} -Region us-east-1"
          else
            echo "No update-ec2-ssh-sg.ps1 found; skipping SG update"
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Write EC2 private key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Trigger remote deploy (pull + up)
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ env.EC2_USER }}@${{ env.EC2_HOST }} "cd ${EC2_APP_DIR} && docker compose pull && docker compose up -d --pull always --force-recreate"
